name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    # FIX: Added Postgres service container so `npm test` can actually connect
    # to a database. Previously the fallback URL postgresql://test:test@localhost
    # would always fail in GitHub Actions because no Postgres instance was running.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: steward_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # TypeScript type-check — fails the build on type errors
      - name: Type check
        run: npx tsc --noEmit

      # Lint — failures block merges
      - name: Lint
        run: npm run lint

      # FIX: Added explicit build step. tsc --noEmit validates types but does NOT
      # produce dist/. A missing module or import error that slips past --noEmit
      # (e.g. a missing declaration file) can still break the Docker build.
      # This step catches those failures in CI before they reach Render.
      - name: Build TypeScript
        run: npm run build

      # Run tests
      - name: Test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/steward_test
          JWT_SECRET: ci-test-jwt-secret-minimum-32-chars-ok
          JWT_REFRESH_SECRET: ci-test-refresh-secret-minimum-32-chars
        run: npm test
