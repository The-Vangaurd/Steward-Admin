name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # Validate that required env vars are set in GitHub Secrets.
      # NEXT_PUBLIC_* are embedded at build time — a missing value means
      # the deployed app sends requests to "" and every API call fails.
      - name: Validate required environment variables
        run: |
          MISSING=""
          if [ -z "${{ secrets.NEXT_PUBLIC_API_URL }}" ]; then
            echo "❌ ERROR: NEXT_PUBLIC_API_URL secret is not set."
            MISSING="$MISSING NEXT_PUBLIC_API_URL"
          else
            echo "✓ NEXT_PUBLIC_API_URL is set"
          fi
          if [ -z "${{ secrets.NEXT_PUBLIC_WS_URL }}" ]; then
            echo "❌ ERROR: NEXT_PUBLIC_WS_URL secret is not set."
            MISSING="$MISSING NEXT_PUBLIC_WS_URL"
          else
            echo "✓ NEXT_PUBLIC_WS_URL is set"
          fi
          if [ -n "$MISSING" ]; then
            echo ""
            echo "Add the missing secrets at:"
            echo "  Repository Settings → Secrets and variables → Actions"
            exit 1
          fi

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL: ${{ secrets.NEXT_PUBLIC_WS_URL }}
        run: npm run build
